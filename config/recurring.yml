# examples:
#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  # Tiered by activity: repos with commits in the last 7 days poll every
  # 10 minutes, last 30 days hourly, anything older every 6 hours.
  sync_hot_repositories:
    class: SyncAllRepositoriesJob
    args: [ "hot" ]
    schedule: every 10 minutes

  sync_warm_repositories:
    class: SyncAllRepositoriesJob
    args: [ "warm" ]
    schedule: every hour at minute 5

  sync_cold_repositories:
    class: SyncAllRepositoriesJob
    args: [ "cold" ]
    schedule: every 6 hours at minute 35
